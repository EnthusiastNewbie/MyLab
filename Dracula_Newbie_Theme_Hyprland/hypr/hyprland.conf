# =================================================================
# DRACULA_NEWBIE_HYPRLAND (Ubuntu 25.10 Edition)
# =================================================================

# 1. MONITOR
monitor=,preferred,auto,1

# 2. AUTOSTART
exec-once = waybar

# ---------------FIX UBUNTU: Il percorso di polkit è diverso da Arch----------------------
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = hyprpaper
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

# APPLICAZIONE TEMA DRACULA
# Imposta il tema GTK, le icone e il cursore tramite gsettings 
# (Utile per le app Libadwaita di Ubuntu)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Dracula'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Dracula-cursors'

# 3. VARIABILI D'AMBIENTE
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Dracula-cursors
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GTK_THEME,Dracula

# -------------------- NVIDIA (De-commenta se hai una scheda NVIDIA) -----------------
# env = LIBVA_DRIVER_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# 4. INPUT (Layout Italiano)
input {
    kb_layout = it
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = no
    }
}

# 5. ESTETICA GENERALE (Dracula Theme)
general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2
    
    # Dracula Colors: Purple -> Pink
    col.active_border = rgb(bd93f9) rgb(ff79c6) 45deg
    col.inactive_border = rgb(44475a)

    layout = dwindle
}

# 6. DECORAZIONI 
decoration {
    rounding = 10
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    # BLUR 
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = on
        ignore_opacity = true
        xray = false
    }

    # -------OMBRE --------SINTASSI DIVERSA PER LA VERSIONE HYPRLAND SU ARCHLINUX)----------
    drop_shadow = true
    shadow_range = 15
    shadow_render_power = 3
    col.shadow = rgba(282a36ee) # Dracula Background scuro
}

# 7. ANIMAZIONI
animations {
    enabled = yes
    bezier = fluent, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 5, fluent
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

# 8. LAYOUTS
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# 9. KEYBINDINGS
$mainMod = SUPER

bind = $mainMod, Q, exec, alacritty
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, L, exec, hyprlock

# Focus
bind = $mainMod, F, fullscreen
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# 10. MISC
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

