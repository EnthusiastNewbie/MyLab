# Sposta la configurazione del formato in alto
format = """
[](#bd93f9)\
$os\
$username\
[](bg:#ff79c6 fg:#bd93f9)\
$directory\
[](fg:#ff79c6 bg:#8be9fd)\
$git_branch\
$git_status\
[](fg:#8be9fd bg:#44475a)\
$c\
$rust\
$nodejs\
$golang\
$php\
[](fg:#44475a bg:#50fa7b)\
$docker_context\
[](fg:#50fa7b bg:#6272a4)\
$time\
[ ](fg:#6272a4)\
"""

# Disabilita la riga vuota all'inizio
add_newline = true

[username]
show_always = true
style_user = "bg:#bd93f9 fg:#282a36"
style_root = "bg:#bd93f9 fg:#ff5555"
format = '[$user ]($style)'

[directory]
style = "bg:#ff79c6 fg:#282a36"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#8be9fd fg:#282a36"
format = '[$all_status$ahead_behind ]($style)'

[c]
symbol = " "
style = "bg:#44475a fg:#8be9fd"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#44475a fg:#ffb86c"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#44475a fg:#50fa7b"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#50fa7b fg:#282a36"
format = '[ $symbol $context ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#6272a4 fg:#f8f8f2"
format = '[  $time ]($style)'

[os]
disabled = false
style = "bg:#bd93f9 fg:#282a36"

[os.symbols]
Ubuntu = " "
Linux = " "
